apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:

    metadata:
      labels:
        app: product-service

    spec:

      containers:

      - name: product-service

        image: festiana3110/uascc-product-service:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 3001

        env:

        - name: JWT_SECRET
          value: secret123

---

apiVersion: v1
kind: Service

metadata:
  name: product-service

spec:

  selector:
    app: product-service

  ports:

  - port: 3001
    targetPort: 3001